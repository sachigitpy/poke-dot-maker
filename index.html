<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>ぽこポケ文字ドットメーカー</title>
    <style>
        body { 
            background: #f8f9fa; /* 白基調（ややグレー） */
            color: #333; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px; 
            margin: 0; 
            min-height: 100vh; 
            box-sizing: border-box; 
        }
        
        h1 { margin: 5px 0 10px 0; font-size: 28px; text-align: center; }

        /* 説明文：白背景に合うよう少し淡い紺色に */
        .description { 
            background: #e9ecef; 
            color: #495057; 
            padding: 8px 15px; 
            border-radius: 4px; 
            text-align: center; 
            margin-bottom: 10px; 
            font-size: 12px; 
            width: 100%; 
            max-width: 750px; 
            box-sizing: border-box;
            border: 1px solid #dee2e6;
        }

        .controls { 
            margin-bottom: 10px; 
            background: #fff; 
            padding: 10px; 
            border-radius: 8px; 
            display: flex; 
            flex-wrap: wrap; /* スマホでボタンがはみ出さないよう折り返し */
            justify-content: center;
            gap: 10px; 
            align-items: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
            border: 1px solid #dee2e6;
            width: 100%;
            max-width: 750px;
            box-sizing: border-box;
        }
        
        input[type="text"] { 
            padding: 8px; 
            font-size: 18px; 
            width: 50px; 
            text-align: center; 
            border: 1px solid #ced4da; 
            border-radius: 4px; 
        }
        
        /* 生成ボタン */
        .gen-btn { 
            padding: 8px 20px; 
            background: #16a085; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px; 
        }

        /* グリッドコンテナ：スマホで横スクロールできるように設定 */
        .grid-container { 
            background: #fff; 
            padding: 8px; 
            border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            border: 1px solid #dee2e6;
            margin-bottom: 10px; 
            max-width: 100%; /* 画面幅を超えない */
            overflow-x: auto; /* はみ出したら横スクロール */
            -webkit-overflow-scrolling: touch; /* iPhoneでスルスル動くように */
        }
        
        /* 14px固定だとスマホで巨大すぎるので、スマホ時はサイズを落とす */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(50, 14px); 
            gap: 1px; 
            background: #ced4da; 
        }
        
        /* スマホ用調整（画面幅が600px以下の時） */
        @media (max-width: 600px) {
            .grid { 
                grid-template-columns: repeat(50, 8px); /* 14pxから8pxに縮小 */
            }
            .cell { 
                width: 8px !important; 
                height: 8px !important; 
            }
            h1 { font-size: 18px; }
            .legend { flex-direction: column; gap: 5px; font-size: 12px; }
        }

        /*　方眼セル */
        .cell { 
            width: 14px; 
            height: 14px; 
            background: #fff; 
            cursor: pointer; 
            position: relative; 
            box-sizing: border-box; 
        }
        
        .cell.black { background: #000; }
        .cell.done { background: #2ecc71 !important; outline: 1px solid #27ae60; }
        .cell.border-top { border-top: 2px solid #ff4757; }
        .cell.border-bottom { border-bottom: 2px solid #ff4757; }
        .cell.border-left { border-left: 2px solid #ff4757; }
        .cell.border-right { border-right: 2px solid #ff4757; }
        
        /* 凡例 */
        .legend { 
            margin-top: 5px; 
            display: flex; 
            gap: 15px; 
            font-size: 13px; 
            padding: 5px; 
            flex-wrap: wrap;
            justify-content: center;
        }
        .box { 
            width: 14px;
            height: 14px;
            display: inline-block;
            vertical-align: middle;
            border: 1px solid #333;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <h1>ぽこポケ文字ドットメーカー</h1>
    <div class="description">
        キャンバス：50 × 30 | 文字エリア：24 × 24 (中央配置)<br>
        マスをクリックすると「完了(緑)」にマークできます。作成の進捗管理にどうぞ。
    </div>

    <div class="controls">
        <span>文字入力:</span>
        <input type="text" id="charInput" maxlength="1" value="武">
        <button class="gen-btn" onclick="generateGrid()">ドット文字を生成</button>
    </div>

    <div class="grid-container">
        <div id="pixelGrid" class="grid"></div>
    </div>

    <div class="legend">
        <div><span class="box" style="background:#000;"></span>塗る場所</div>
        <div><span class="box" style="background:#fff;"></span>背景</div>
        <div><span class="box" style="background:#2ecc71; border-color:#2ecc71;"></span>完了</div>
        <div style="color: #ff4757; font-weight: bold;">[ ] 赤枠：描画エリア</div>
    </div>

    <script>
        function generateGrid() {
            const char = document.getElementById('charInput').value || " ";
            const container = document.getElementById('pixelGrid');
            container.innerHTML = ''; // 前に作ったマスを全部消してリセット

            // --- STEP 1: ブラウザの「Canvas API」で文字をドット化 ---
            const canvas = document.createElement('canvas');
            canvas.width = 24; // 文字を描くための24マスの下書き用紙
            canvas.height = 24;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = "black";
            // フォント設定
            ctx.font = "bold 20px 'MS Gothic', 'Hiragino Sans', 'Apple Gothic', sans-serif";
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(char, 12, 12); // 用紙の真ん中に文字を描く

            // 用紙からピクセルデータ（色の情報）を抜き出す
            const imgData = ctx.getImageData(0, 0, 24, 24).data;
            const bits = [];
            for (let i = 3; i < imgData.length; i += 4) {
                // 透明度(A)が110より濃いなら1(塗る)、薄いなら0(塗らない)
                bits.push(imgData[i] > 110 ? 1 : 0);
            }

            // --- STEP 2: 配置の計算 (50x30の中央に24x24を置く) ---
            // 横：(50マス - 24マス) / 2 = 13マス目から開始
            const offsetLeft = 13; 
             // 縦：(30マス - 24マス) / 2 = 3マス目から開始
            const offsetTop = 3;

            const offsetRight = offsetLeft + 23;  // 文字エリアの右端
            const offsetBottom = offsetTop + 23; // 文字エリアの下端

            // --- STEP 3: 50×30のマス目をHTMLで作る ---
            for (let y = 0; y < 30; y++) {      // 縦に30回ループ
                for (let x = 0; x < 50; x++) {  // 横に50回ループ
                    const cell = document.createElement('div');
                    cell.className = 'cell';

                     // マスに座標データを書き込む
                    cell.dataset.coord = `X:${x}, Y:${y}`;

                    // 文字エリア（赤枠）の中かどうかの判定
                    const isInsideX = (x >= offsetLeft && x <= offsetRight);
                    const isInsideY = (y >= offsetTop && y <= offsetBottom);

                    if (isInsideX && isInsideY) {
                        // 赤枠の線をつける
                        if (x === offsetLeft) cell.classList.add('border-left');
                        if (x === offsetRight) cell.classList.add('border-right');
                        if (y === offsetTop) cell.classList.add('border-top');
                        if (y === offsetBottom) cell.classList.add('border-bottom');

                        // bits配列（24x24のデータ）から今の座標に合うデータを取り出す
                        const bitIndex = (y - offsetTop) * 24 + (x - offsetLeft);
                        if (bits[bitIndex] === 1) cell.classList.add('black');
                    }
                    // クリックで進捗管理（緑色にする）
                    cell.onclick = function() { this.classList.toggle('done'); };
                    container.appendChild(cell);    // 画面上のグリッドに追加
                }
            }
        }
        window.onload = generateGrid;   // ページを開いた時に最初の1回を実行
    </script>
</body>
</html>
